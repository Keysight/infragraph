components:
  schemas:
    Annotation.Attribute:
      description: Defines an annotation to be applied to a graph node.
      type: object
      properties:
        attribute:
          description: |-
            The attribute name that will be added to the endpoint.
          type: string
          x-field-uid: 1
        value:
          description: |-
            The attribute value that will be added to the endpoint.
          type: string
          x-field-uid: 2
    Annotation.Node:
      description: Defines an annotation to be applied to a graph node.
      type: object
      properties:
        name:
          description: |-
            A fully qualified node name that MUST exist in the graph.
            - server.0.xpu.0
            - server.6.nic.3
            - switch.2.asic.0
          type: string
          x-field-uid: 1
        attributes:
          description: |-
            An inventory of attributes and values.
          type: array
          items:
            $ref: "#/components/schemas/Annotation.Attribute"
          x-field-uid: 2
    Annotation.Link:
      description: Defines an annotation to be applied to a graph link.
      type: object
      properties:
        name:
          description: |-
            A fully qualified link name that MUST exist in the graph.
            - pcie
          type: string
          x-field-uid: 1
        attributes:
          description: |-
            An inventory of attributes and values.
          type: array
          items:
            $ref: "#/components/schemas/Annotation.Attribute"
          x-field-uid: 2
    Annotation.Edge:
      description: Defines an annotation to be applied to a graph edge.
      type: object
      properties:
        ep1:
          description: |-
            A fully qualified endpoint name that MUST exist as part of an edge along with ep2 in the graph.
            - server.0.xpu.0
            - server.6.nic.3
            - switch.2.asic.0
          type: string
          x-field-uid: 1
        ep2:
          description: |-
            A fully qualified endpoint name that MUST exist as part of an edge along with ep1 in the graph.
            - server.0.xpu.0
            - server.6.nic.3
            - switch.2.asic.0
          type: string
          x-field-uid: 2
        attributes:
          description: |-
            An inventory of attributes and values.
          type: array
          items:
            $ref: "#/components/schemas/Annotation.Attribute"
          x-field-uid: 3
    Annotation:
      description: Request object specifying which graph elements (nodes or edges) to annotate and the annotations to apply.
      type: object
      properties:
        nodes:
          description: List of annotations to apply to nodes.
          type: array
          items:
            $ref: "#/components/schemas/Annotation.Node"
          x-field-uid: 1
        edges:
          type: array
          description:  List of annotations to apply to edges.
          items:
            $ref: "#/components/schemas/Annotation.Edge"
          x-field-uid: 2
        links:
          type: array
          description: List of annotations to apply to links.
          items:
            $ref: "#/components/schemas/Annotation.Link"
          x-field-uid: 3