components:
  schemas:
    Annotation.Config:
      type: object
      description: full or partial annotations
      properties:
        annotations:
          $ref: "#/components/schemas/Annotation.Type"
          x-field-uid: 1

    Annotation.Type:
      type: object
      description: choose whether full or partial annotations
      properties:
        choice:
          description: ""
          type: string
          x-field-uid: 1
          x-enum:
            full:
              x-field-uid: 1
            partial:
              x-field-uid: 2
        full:
          type: string
          description: full annotations
          x-field-uid: 2
        partial:
          type: string
          description: partial annotations
          x-field-uid: 3
    GraphResponse.Infragraph:
      type: object
      description: returns an infragraph(infrastructure and annotations)
      properties:
        infrastructure:
          $ref: "./infrastructure.yaml#/components/schemas/Infrastructure"
          x-field-uid: 1
        annotations:
          $ref: "./annotation.yaml#/components/schemas/Annotation"
          x-field-uid: 2

    Graph.Type:
      type: object
      description: returns the type of graph could be infragraph, networkx
      properties:
        choice:
          description: 
          type: string
          x-field-uid: 1
          x-enum:
            infragraph:
              x-field-uid: 1

    GraphRequest:
      description: Request specifying the type of graph you want
      type: object
      properties:
        choice:
          description: choose betweeen infragraph and networkx
          type: string
          x-field-uid: 1
          x-enum:
            infragraph:
              x-field-uid: 1
            networkx:
              x-field-uid: 2
        infragraph:
          description: returns infrastructure and annotations as a json
          $ref : "#/components/schemas/Annotation.Config"
          x-field-uid: 2
        networkx:
          description: returns networkx graph as a string with nodes and edges
          $ref : "#/components/schemas/Annotation.Config"
          x-field-uid: 3

    GraphResponseContent:
      type: object
      description: graph content type infragraph or networkx
      properties: 
        choice:
          description: choose infragraph or networkx
          type: string
          x-field-uid: 1
          x-enum:
            infragraph:
              x-field-uid: 1
            networkx:
              x-field-uid: 2
        infragraph:
          $ref: '#/components/schemas/GraphResponse.Infragraph'
          x-field-uid: 2
        networkx:
          description: |-
            This contains the returned graph content formatted as a networkx yaml string.
          type: string
          x-field-uid: 3


  responses:
    GraphResponse:
      description: |-
        The entire fully validated graph content.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GraphResponseContent'