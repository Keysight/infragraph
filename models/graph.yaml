components:
  schemas:
    GraphResponse.Infragraph:
      type: object
      description: returns an infragraph(infrastructure and annotations)
      properties:
        infrastructure:
          $ref: "./infrastructure.yaml#/components/schemas/Infrastructure"
          x-field-uid: 1
        annotations:
          $ref: "./annotation.yaml#/components/schemas/Annotation"
          x-field-uid: 2

    Graph.Type:
      type: object
      description: returns the type of graph could be infragraph, networkx
      properties:
        choice:
          description: 
          type: string
          x-field-uid: 1
          x-enum:
            infragraph:
              x-field-uid: 1

    GraphRequest:
      description: Request specifying the desired format for the returned graph.
      type: object
      properties:
        attribute_type:
          x-field-uid: 1
          description: full or partial attributes information
          type: string
          default: full
          x-enum:
            full:
              x-field-uid: 1
            partial:
              x-field-uid: 2
        graph_type:
                  $ref: "#/components/schemas/Graph.Type"
                  x-field-uid: 2
    GraphContent:
      type: object
      description: graph content type infragraph or networkx
      properties: 
        choice:
          description: choose infragraph or networkx
          type: string
          x-field-uid: 1
          x-enum:
            infragraph:
              x-field-uid: 1
            networkx:
              x-field-uid: 2
        infragraph:
          $ref: '#/components/schemas/GraphResponse.Infragraph'
          x-field-uid: 2
            
    GraphResponseContent:
      type: object
      description: content for graph response
      properties:
        choice:
          description: choose graph response content
          type: string
          x-field-uid: 1
          x-enum:
            graph_type:
              x-field-uid: 1
        graph_type:
          $ref: '#/components/schemas/GraphContent'
          x-field-uid: 3

  responses:
    GraphResponse:
      description: |-
        The entire fully validated graph content.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GraphResponseContent'