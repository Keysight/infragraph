components:
  schemas:
    GraphRequest:
      description: Request specifying the desired format for the returned graph.
      type: object
      properties:
        choice:
          description: |-
            The type of graph to be returned.
          type: string
          x-field-uid: 1
          x-enum:
            full:
              x-field-uid: 1
            partial:
              x-field-uid: 2

    GraphContent:
      description: The content of the graph response.  
      type: object
      properties:
        choice:
          description: Specifies whether the returned graph is full or partial. 
          type: string
          x-field-uid: 1
          x-enum:
            full:              
              x-field-uid: 1
            partial:
              x-field-uid: 2
        full:
          description: |-
            The graph content returned as a full graph with annotations. 
          type: string
          x-field-uid: 2      
        partial:
          description: |-
            The graph content returned as a partial graph with no annotations. 
          type: string
          x-field-uid: 3
  responses:
    GraphResponse:
      description: |-
        The entire fully validated graph content.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GraphContent'

