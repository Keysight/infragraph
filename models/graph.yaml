components:
  schemas:
    GraphRequest:
      description: Request specifying the desired format for the returned graph.
      type: object
      properties:
        format:
          description: |-
            The format that the graph will be returned in.
          type: string
          x-field-uid: 1
          x-enum:
            compressed:
              x-field-uid: 1
            expanded:
              x-field-uid: 2
        attributes:
          description: |-
            The attributes to be included in the returned graph.
          type: string
          x-field-uid: 2
          x-enum:
            full:
              x-field-uid: 1
            partial:
              x-field-uid: 2
    GraphContent:
      description: The content of the graph response, specifying the format and the serialized graph data.
      type: object
      properties:
        choice:
          description: Specifies the format of the returned graph content.
          type: string
          x-field-uid: 1
          x-enum:
            compressed:
              x-field-uid: 1
            expanded: 
              x-field-uid: 2
        compressed:
          description: |-
            This graph content returns a compressed graph
          type: string
          x-field-uid: 2
        expanded:
          description: |- 
            The graph content returned a expanded graph
          type: string
          x-field-uid: 3
  responses:
    GraphResponse:
      description: |-
        The entire fully validated graph content.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GraphContent'

