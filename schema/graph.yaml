components:
  schemas:
    Annotation.Config:
      type: object
      description: |-
        Configuration controlling which annotations are returned with the graph.
      properties:
        annotations:
          description: |-
            Selects whether the response includes the full set of annotations or only the user-applied (partial) annotations.
          $ref: "#/components/schemas/Annotation.Type"
          x-field-uid: 1

    Annotation.Type:
      type: object
      description: |-
        Selects the scope of annotations to return on graph elements.
      properties:
        choice:
          description: |-
            Chooses between returning the complete annotation set or only the
            partial (user-applied) annotations.
              - full: include every attribute present on nodes, edges and links.
              - partial: include only attributes added on top of the underlying infrastructure.
          type: string
          x-field-uid: 1
          x-enum:
            full:
              x-field-uid: 1
            partial:
              x-field-uid: 2
        full:
          type: string
          description: |-
            Returns every attribute set on graph elements, including those derived from the underlying infrastructure.
          x-field-uid: 2
        partial:
          type: string
          description: |-
            Returns only the annotations that have been explicitly applied on top of the infrastructure, excluding immutable infrastructure-derived attributes.
          x-field-uid: 3

    GraphResponse.Infragraph:
      type: object
      description: |-
        The infragraph representation of the current graph, consisting of the infrastructure definition and the annotations applied to its nodes, edges and links.
      properties:
        infrastructure:
          description: |-
            The infrastructure definition that the graph was built from.
          $ref: "./infrastructure.yaml#/components/schemas/Infrastructure"
          x-field-uid: 1
        annotations:
          description: |-
            The set of annotations applied to nodes, edges and links of the graph.
          $ref: "./annotation.yaml#/components/schemas/Annotation"
          x-field-uid: 2

    Graph.Type:
      type: object
      description: |-
        Selects the representation used when returning the graph.
      properties:
        choice:
          description: |-
            The graph representation to return.
              - infragraph: native infrastructure + annotations representation.
          type: string
          x-field-uid: 1
          x-enum:
            infragraph:
              x-field-uid: 1

    GraphRequest:
      description: |-
        Request specifying which graph representation to return and how
        annotations should be included in the response.
      type: object
      properties:
        choice:
          description: |-
            The graph representation to return.
              - infragraph: infrastructure and annotations as a structured object.
              - networkx: a networkx node-link graph serialized as a YAML string.
          type: string
          x-field-uid: 1
          x-enum:
            infragraph:
              x-field-uid: 1
            networkx:
              x-field-uid: 2
        infragraph:
          description: |-
            Annotation configuration applied when returning the graph as an infragraph (infrastructure and annotations).
          $ref : "#/components/schemas/Annotation.Config"
          x-field-uid: 2
        networkx:
          description: |-
            Annotation configuration applied when returning the graph as a networkx node-link YAML string.
          $ref : "#/components/schemas/Annotation.Config"
          x-field-uid: 3

    GraphResponseContent:
      type: object
      description: |-
        The content of a graph response, returned either as a structured infragraph object or as a networkx YAML string depending on the request.
      properties:
        choice:
          description: |-
            The representation contained in this response.
              - infragraph: structured infrastructure and annotations object.
              - networkx: networkx node-link graph serialized as a YAML string.
          type: string
          x-field-uid: 1
          x-enum:
            infragraph:
              x-field-uid: 1
            networkx:
              x-field-uid: 2
        infragraph:
          description: |-
            The graph returned as a structured infragraph (infrastructure plus annotations).
          $ref: '#/components/schemas/GraphResponse.Infragraph'
          x-field-uid: 2
        networkx:
          description: |-
            The graph returned as a networkx node-link graph serialized as a YAML string.
          type: string
          x-field-uid: 3


  responses:
    GraphResponse:
      description: |-
        The current graph content, returned in the representation selected by the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GraphResponseContent'
