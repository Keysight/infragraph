components:
  schemas:
    Query.Attribute:
      description: Attribute and its value.
      type: object
      properties:
        attribute:
          description: |-
            The attribute key.
          type: string
          x-field-uid: 1
        value:
          description: |-
            The attribute value.
          type: string
          x-field-uid: 2
    Query.Response.Node:
      description: Matched node name and its attributes present in the graph.
      type: object
      properties:
        name:
          description: |-
            Matched node name present in the graph.
          type: string
          x-field-uid: 1
        attributes:
          description: |-
            An inventory of attributes and values of the current node.
          type: array
          items:
            $ref: "#/components/schemas/Query.Attribute"
          x-field-uid: 2
    Query.Response.Edge:
      description: Matched edges and their attributes present in the graph.
      type: object
      properties:
        ep1:
          description: |-
            Matched endpoint one.
          type: string
          x-field-uid: 1
        ep2:
          description: |-
            Matched endpoint two.
          type: string
          x-field-uid: 2
        attributes:
          description: |-
            An inventory of attributes and values.
          type: array
          items:
            $ref: "#/components/schemas/Query.Attribute"
          x-field-uid: 3  
    Query.Response:
      description: Query response object - a query filter can act on the graph and respond with array of nodes or edges or graph attributes.
      type: object
      properties:
        nodes:
          description: List of matched nodes of the graph with attributes.
          type: array
          items:
            $ref: "#/components/schemas/Query.Response.Node"
          x-field-uid: 1
        edges:
          type: array
          description:  List of matched edges of the graph with attributes.
          items:
            $ref: "#/components/schemas/Query.Response.Edge"
          x-field-uid: 2
        graph:
          description: List of matched graph attributes.
          type: array
          items:
            $ref: "#/components/schemas/Query.Attribute"
          x-field-uid: 3 
    Query.Request.Node:
      description: Defines request for node match
      type: object
      properties:
        node_identifier:
          description: |-
            Endpoint name that MUST exist or match edges present in the graph. This supports slicing operator and expands to the networkx expanded format:
            - server[0]xpu[0]
            - server[0:2]
            - switch
          type: array
          items:
            type: string
          x-field-uid: 1
        attribute_filter:
          description: Attribute-based filter criteria.
          $ref: "#/components/schemas/Query.Request.Attribute"
          x-field-uid: 2
    Query.Request.Edge:
      description: Defines request for edge match
      type: object
      properties:
        endpoints:
          description: |-
            Array of edge endpoints where you want to filter
          type: array
          items:
            $ref:  "#/components/schemas/Query.Request.Edge.Endpoints"
          x-field-uid: 1
        attribute_filter:
          description: Attribute-based filter criteria.
          $ref: "#/components/schemas/Query.Request.Attribute"
          x-field-uid: 2
    Query.Request.Edge.Endpoints:
      description: Defines request for edge match
      type: object
      properties:
        ep1:
          description: |-
            Endpoint name that MUST exist or match edges present in the graph. This supports slicing operator and expands to the networkx expanded format:
            - server[0]xpu[0]
            - server[0:2]
            - switch
          type: string
          x-field-uid: 1
        ep2:
          description: |-
            Endpoint name that MUST exist or match edges present in the graph. This supports slicing operator and expands to the networkx expanded format:
            - server[0]xpu[0]
            - server[0:2]
            - switch
          type: string
          x-field-uid: 2
    Query.Request.Attribute:
      description: Query request attributes with logical operation on all of the attributes.
      type: object
      properties:
        attributes:
          description: |-
            Attributes for filter
          type: array
          items:
            $ref: "#/components/schemas/Query.Attribute"
          x-field-uid: 1
        logic:
          description: Logical operation to combine this filter with others. Default is "and".
          type: string
          x-field-uid: 2
          x-enum:
            and:
              x-field-uid: 1
            or:
              x-field-uid: 2
    Query.Request.Filter:
      description: Defines a filter on nodes, either by attributes or by node IDs.
      type: object
      properties:
        node_filter:
          description:  |-
            Node name filter
          $ref: "#/components/schemas/Query.Request.Node"
          x-field-uid: 1
        edge_filter:
          description:  |-
            Edge filter.
          $ref: "#/components/schemas/Query.Request.Edge"
          x-field-uid: 2
        graph_filter:
          description: Graph filter.
          $ref: "#/components/schemas/Query.Request.Attribute"
          x-field-uid: 3 
    Query.Request.ShortestPath:
      description: Filter specifying the shortest path constraints, with source and destination nodes.
      type: object
      required:
        - name
        - source
        - destination
      properties:
        name:
          description: Name of the shortest path filter.
          type: string
          x-field-uid: 1
        source:
          description: Node ID from which to start the shortest path. This should be an EXACT match.
          type: string
          x-field-uid: 2
        destination:
          description: Node ID at which the shortest path ends. This should be an EXACT match.
          type: string
          x-field-uid: 3
    Query.Request:
      description: A request object specifying filters to be used for querying nodes, graph attributes, or shortest paths.
      type: object
      properties:
        choice:
          description: Type of filters specified in this query request.
          type: string
          x-field-uid: 1
          x-enum:
            filter:
              x-field-uid: 1
            shortest_path:
              x-field-uid: 2
        filter:
          description: filter to get data from graph.
          $ref: "#/components/schemas/Query.Request.Filter"
          x-field-uid: 2
        shortest_path:
          description: |-
            Add shortest path filters to retrieve the shortest path between source and destination nodes
          $ref: "#/components/schemas/Query.Request.ShortestPath"
          x-field-uid: 3
  responses:
      QueryResponseContent:
        description: |-
          Answer to the query request.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Query.Response'